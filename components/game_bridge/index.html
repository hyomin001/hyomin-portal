<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
var myGameType = null;
var myHandler  = null;

function setComponentValue(val) {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setComponentValue",
    value: val,
    dataUrls: []
  }, "*");
}

// Streamlit에서 args로 game_type 받기
function onStreamlitRender(event) {
  if (!event.data || event.data.type !== 'streamlit:render') return;
  var args = event.data.args || {};
  var newGameType = args.game_type || null;
  if (!newGameType || newGameType === myGameType) return;

  // 이전 handler 제거
  if (myHandler) {
    window.parent.removeEventListener('message', myHandler);
    myHandler = null;
  }

  myGameType = newGameType;

  // 새 handler 등록 — window.parent에 직접
  myHandler = function(e) {
    if (e.data && e.data.type === myGameType) {
      setComponentValue(e.data);
    }
  };
  window.parent.addEventListener('message', myHandler);
}

window.addEventListener('message', onStreamlitRender);

window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: 0 }, "*");
</script>
</body>
</html>
